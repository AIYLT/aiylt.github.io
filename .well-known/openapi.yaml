openapi: 3.1.0
info:
  title: AIYLT Plugin API
  version: "1.0.0"
  description: |-
    AIYLT 的 ChatGPT 插件 API，支持智能问答与扩展调用。
servers:
  - url: https://aiylt.github.io/.well-known
paths:
  /hello:
    get:
      summary: 示例接口，返回 Hello World
      operationId: hello
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello World
components: {}